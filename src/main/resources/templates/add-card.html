<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Card | E-Learning</title>
    <link rel="stylesheet" href="/CSS/auth.css">
</head>
<body>
<div class="container">
    <fieldset>
        <legend>Add Your Card</legend>

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <div class="success-msg" th:if="${success}" th:text="${success}"></div>

        <form action="/wallet/add-card" method="post">

            <div class="form-group">
                <label for="cardHolderName">Cardholder Name:</label>
                <input type="text" id="cardHolderName" name="cardHolderName"
                       placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" name="cardNumber" maxlength="16" required>
            </div>

            <div class="form-group">
                <label for="expiryMonth">Expiry Date:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="expiryMonth" name="expiryMonth" required>
                        <option value="">Month</option>
                        <option value="1">01 - January</option>
                        <option value="2">02 - February</option>
                        <option value="3">03 - March</option>
                        <option value="4">04 - April</option>
                        <option value="5">05 - May</option>
                        <option value="6">06 - June</option>
                        <option value="7">07 - July</option>
                        <option value="8">08 - August</option>
                        <option value="9">09 - September</option>
                        <option value="10">10 - October</option>
                        <option value="11">11 - November</option>
                        <option value="12">12 - December</option>
                    </select>

                    <select id="expiryYear" name="expiryYear" required>
                        <option value="">Year</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="cvv">CVV:</label>
                <input type="password" id="cvv" name="cvv" maxlength="4" required>
            </div>

            <div class="form-group">
                <label for="initialBalance">Initial Card Balance (EGP):</label>
                <input type="number" id="initialBalance" name="initialBalance" min="0" step="0.01" required>
            </div>

            <div class="form-buttons">
                <input type="submit" value="Save Card">
                <input type="reset" value="Reset">
            </div>

            <div class="link-section">
                <a href="/wallet">← Back to Wallet</a>
            </div>

        </form>

    </fieldset>
</div>
</body>
</html>

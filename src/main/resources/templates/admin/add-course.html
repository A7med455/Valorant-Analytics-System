<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course | Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0B2B40 0%, #1D5A6D 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            max-width: 750px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .form-header {
            background: linear-gradient(105deg, #0A2E3A, #0F3B4A);
            color: white;
            padding: 32px 36px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .form-header p {
            font-size: 15px;
            opacity: 0.9;
            font-weight: 400;
        }

        .form-body {
            padding: 36px 40px;
            background: #FEFCF6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #1F4E5F;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        label .required {
            color: #E67E22;
            margin-left: 4px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 18px;
            background-color: #FFFFFF;
            border: 1.5px solid #DCDFE4;
            border-radius: 28px;
            font-size: 15px;
            font-family: 'Inter', monospace;
            transition: all 0.25s ease;
            color: #1C3B44;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #F4A261;
            box-shadow: 0 0 0 4px rgba(244, 162, 97, 0.15);
            background-color: #FFFFFF;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            border-radius: 28px;
        }

        .form-actions {
            display: flex;
            gap: 18px;
            margin-top: 36px;
        }

        .btn-submit, .btn-cancel {
            padding: 12px 20px;
            font-weight: 700;
            font-size: 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit {
            background: #E76F51;
            color: white;
            flex: 2;
            box-shadow: 0 6px 14px rgba(231, 111, 81, 0.3);
        }

        .btn-submit:hover {
            background: #D55A3E;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(231, 111, 81, 0.4);
        }

        .btn-cancel {
            background: #E9ECEF;
            color: #2F6B7A;
            flex: 1;
            border: 1px solid #D6DADD;
        }

        .btn-cancel:hover {
            background: #DEE2E6;
            transform: translateY(-2px);
        }

        .optional-badge {
            font-size: 11px;
            font-weight: 500;
            background: #FFE8D6;
            color: #E76F51;
            padding: 2px 10px;
            border-radius: 30px;
            margin-left: 8px;
        }

        @media (max-width: 640px) {
            .form-body {
                padding: 24px 20px;
            }
            .form-actions {
                flex-direction: column;
                gap: 12px;
            }
            .btn-submit, .btn-cancel {
                flex: auto;
            }
            .form-header h1 {
                font-size: 24px;
            }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23E76F51' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>📘 Add New Course</h1>
        <p>Enter course details to publish on the platform</p>
    </div>
    <div class="form-body">
        <form action="/admin/add-course" method="post" th:object="${course}">

            <div class="form-group">
                <label>Course Title <span class="required">*</span></label>
                <input type="text" th:field="*{title}" placeholder="e.g., Advanced React & Next.js" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="What will students learn?"></textarea>
            </div>

            <div class="form-group">
                <label>Price (USD) <span class="required">*</span></label>
                <input type="number" step="0.01" th:field="*{price}" placeholder="49.99" required>
            </div>

            <div class="form-group">
                <label>Image URL <span class="optional-badge">optional</span></label>
                <input type="text" th:field="*{imageUrl}" placeholder="https://example.com/course-image.jpg">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}">
                    <option value="">-- Select Category --</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="Fullstack">Fullstack</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">➕ Create Course</button>
                <a href="/admin/dashboard" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>

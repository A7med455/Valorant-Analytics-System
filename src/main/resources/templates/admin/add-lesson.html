<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Lesson | Admin</title>
    <link rel="stylesheet" href="/CSS/add-course.css">
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>📹 Add Lesson</h1>
        <p th:text="'Course: ' + ${course.title}">Course Name</p>
    </div>
    <div class="form-body">

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>

        <form th:action="'/admin/add-lesson/' + ${course.id}" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label>Lesson Title <span class="required">*</span></label>
                <input type="text" name="title" placeholder="e.g., Introduction to the Course" required>
            </div>

            <div class="form-group">
                <label>Video URL <span class="optional-badge">optional</span></label>
                <input type="text" name="videoUrl" placeholder="https://youtube.com/watch?v=...">
            </div>

            <p style="text-align: center; margin: 20px 0; color: #888;">— OR —</p>

            <div class="form-group">
                <label>Upload Video File <span class="optional-badge">optional</span></label>
                <input type="file" name="videoFile" accept="video/*">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">➕ Add Lesson</button>
                <a href="/admin/dashboard" class="btn-cancel">Cancel</a>
            </div>

        </form>
    </div>
</div>
</body>
</html>

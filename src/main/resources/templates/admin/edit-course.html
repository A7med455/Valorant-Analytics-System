<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Course | Admin</title>
  <link rel="stylesheet" href="/css/edit-course.css">
</head>
<body>
<div class="form-container">
  <div class="form-header">
    <h1>✏️ Edit Course</h1>
    <p>Update course information</p>
  </div>
  <div class="form-body">
    <form th:action="'/admin/edit-course/' + ${course.id}" method="post" th:object="${course}">
      <div class="form-group">
        <label>Course Title <span class="required">*</span></label>
        <input type="text" th:field="*{title}" placeholder="e.g., Fullstack Development Bootcamp" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea th:field="*{description}" placeholder="Write a compelling description..."></textarea>
      </div>

      <div class="form-group">
        <label>Price (USD) <span class="required">*</span></label>
        <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required>
      </div>

      <div class="form-group">
        <label>Image URL <span class="optional-badge">optional</span></label>
        <input type="text" th:field="*{imageUrl}" placeholder="https://example.com/card.jpg">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select th:field="*{category}">
          <option value="">-- Select Category --</option>
          <option value="Frontend">Frontend</option>
          <option value="Backend">Backend</option>
          <option value="Fullstack">Fullstack</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">💾 Update Course</button>
        <a href="/admin/dashboard" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>

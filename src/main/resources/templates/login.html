<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/CSS/auth.css">
</head>
<body>
<div class="container">
    <fieldset>
        <legend>Login</legend>

        <!--checks if error exist then text will be written else div is  removed-->
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>


        <form action="/login" method="post">

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="yourname@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password"> Password:</label>
                <input type="password" id="password" name="password" placeholder="Your Current Password" required>
            </div>

            <!-- for Cookies -->
            <div class="form-group">
                <label>
                    <input type="checkbox" name="rememberMe">Remember Me
                </label>
            </div>
            <div class="form-buttons">
                <input type="submit" value="Login">
                <input type="reset" value="Reset">
            </div>

            <div class="link-section">
                <br>
                <a href="/signup">Don't have an account? Sign Up</a>
            </div>


        </form>
    </fieldset>
</div>
</body>
</html>

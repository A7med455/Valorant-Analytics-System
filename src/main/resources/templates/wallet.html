<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wallet</title>
</head>
<body>

<h2 th:text="'Welcome, ' + ${name}">Welcome</h2>

<!-- ═══════════════════════════════════════════
     WALLET BALANCE
════════════════════════════════════════════ -->
<h3>Wallet Balance</h3>
<p th:text="'Balance: ' + ${balance} + ' EGP'">Balance: 0 EGP</p>

<!-- Error message -->
<p th:if="${error != null}" style="color:red;" th:text="${error}"></p>

<!-- ═══════════════════════════════════════════
     CARD SECTION
     If card exists → show card info + top-up form
     If no card    → show "Add Card" button
════════════════════════════════════════════ -->

<!-- ── User HAS a card ── -->
<div th:if="${card != null}">

    <h3>Linked Card</h3>
    <p th:text="'Card Holder: ' + ${card.cardHolderName}"></p>
    <p th:text="'Card Number: **** **** **** ' + ${card.lastFourDigits}"></p>
    <p th:text="'Expiry: ' + ${card.expiryMonth} + '/' + ${card.expiryYear}"></p>
    <p th:text="'Card Balance: ' + ${card.balance} + ' EGP'"></p>

    <!-- Top-Up Form (only shown when card exists) -->
    <h3>Top Up Wallet</h3>
    <form action="/wallet/topup" method="post">
        <label>Amount (EGP):
            <input type="number" name="amount" min="1" step="0.01" required/>
        </label>
        <button type="submit">Top Up</button>
    </form>

</div>

<!-- ── User has NO card ── -->
<div th:if="${card == null}">
    <p>You have no card linked to your account.</p>
    <a href="/wallet/add-card">
        <button>Add Card</button>
    </a>
</div>

<!-- ═══════════════════════════════════════════
     TRANSACTION HISTORY
════════════════════════════════════════════ -->
<h3>Transaction History</h3>

<div th:if="${transactions == null or #lists.isEmpty(transactions)}">
    <p>No transactions yet.</p>
</div>

<div th:each="t : ${transactions}">
    <hr/>
    <p th:text="'Date: ' + ${t.timestamp}"></p>
    <p th:text="'Type: ' + ${t.type}"></p>
    <p th:text="'Amount: ' + ${t.amount} + ' EGP'"></p>
    <p th:text="'Details: ' + ${t.description}"></p>
</div>

</body>
</html>
